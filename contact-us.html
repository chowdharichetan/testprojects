<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <header class="contact-hero">
        <h1>Get In Touch</h1>
        <p>Have a project in mind or just want to say hi? We'd love to hear from you.</p>
    </header>

    <section class="info-grid">
        <div class="info-card">
            <h3>Email Us</h3>
            <p>hello@example.com</p>
        </div>
        <div class="info-card">
            <h3>Call Us</h3>
            <p>+1 (555) 000-0000</p>
        </div>
        <div class="info-card">
            <h3>Visit Us</h3>
            <p>123 Innovation Way, Tech City</p>
        </div>
    </section>

    <section class="contact-main">
        <div class="container">
            <div class="contact-wrapper">
                
                <div class="contact-form">
                    <h2>Send a Message</h2>
                    <form>
                        <div class="form-group">
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group">
                            <textarea rows="5" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>

                <div class="contact-map">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8354345093747!2d-122.4194155!3d37.7749295!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80859a6d00690021%3A0x4a501367f076adff!2sSan%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1633000000000!5m2!1sen!2sus" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>

            </div>
        </div>
    </section>
<style>
	/* Base Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f9fafb;
    color: #1f2937;
}

/* Hero Section */
.contact-hero {
    background: #4f46e5;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.contact-hero h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
}

/* Info Cards */
.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: -40px auto 40px;
    padding: 0 20px;
}

.info-card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

.info-card h3 {
    color: #4f46e5;
    margin-bottom: 8px;
}

/* Main Content Wrapper */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
}

.contact-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

/* Form Styles */
.contact-form {
    padding: 40px;
}

.form-group {
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    outline: none;
    transition: 0.2s;
}

input:focus, textarea:focus {
    border-color: #4f46e5;
    ring: 2px #4f46e5;
}

.submit-btn {
    width: 100%;
    padding: 14px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

.submit-btn:hover {
    background: #4338ca;
}

/* Map Styles */
.contact-map {
    min-height: 400px;
}

/* Responsive Fix */
@media (max-width: 768px) {
    .contact-wrapper {
        grid-template-columns: 1fr;
    }
}
</style>
</body>
</html>
